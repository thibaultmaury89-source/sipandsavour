<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sip & Savour — Salon Privé & Maison de Torréfaction</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       THEME & DESIGN SYSTEM : LUXE DISCRET & DUALITÉ LUMIÈRE
    ============================================================ */
    :root {
      --bg-salon:      #120c08; 
      --panel-bg:      rgba(24, 17, 12, 0.85);
      --gold:          #c5a880; 
      --gold-dim:      #9c825f;
      --cream:         #f4ede2; 
      --text-light:    #fdfbf7;
      --text-muted:    #a09385;
      --border-lux:    rgba(197, 168, 128, 0.2);
      --shadow-lux:    0 20px 40px rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg-salon:      #fdfbf7;
      --panel-bg:      rgba(244, 237, 226, 0.85);
      --gold:          #8c724b;
      --gold-dim:      #6e5836;
      --cream:         #120c08;
      --text-light:    #1c140e;
      --text-muted:    #5c5246;
      --border-lux:    rgba(140, 114, 75, 0.2);
      --shadow-lux:    0 20px 40px rgba(140, 114, 75, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-salon);
      color: var(--text-light);
      transition: background-color 0.5s ease, color 0.5s ease;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1, h2, h3, .font-serif {
      font-family: 'Cormorant Garamond', serif;
    }

    /* EFFETS GLASSMORPHISM LUXE */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-lux);
      box-shadow: var(--shadow-lux);
    }

    /* ANIMATIONS ET TRANSTIONS */
    .fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* SCROLLBAR CUSTOM */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }

    /* BOUTONS STYLE OR LUXE */
    .btn-luxe {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #120c08 !important;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }
    .btn-luxe:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(197, 168, 128, 0.4);
    }

    .filter-btn-luxe {
      border: 1px solid var(--border-lux);
      color: var(--text-muted);
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .filter-btn-luxe.active, .filter-btn-luxe:hover {
      border-color: var(--gold);
      color: var(--text-light);
      background: rgba(197, 168, 128, 0.1);
    }

    /* COMPORTEMENT DES ÉCRANS PRÉVUS POUR LA TRANSITION */
    #authGate {
      display: flex;
      transition: opacity 0.5s ease;
    }
    #authGate.hidden {
      display: none !important;
    }
    #appWrapper {
      display: none;
      opacity: 0;
    }
    #appWrapper.active {
      display: block;
      opacity: 1;
      animation: fadeIn 0.8s ease forwards;
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#c5a880',
          }
        }
      }
    }
  </script>
</head>
<body class="p-0 m-0">

  <div id="authGate" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0d0805] px-4">
    <div class="glass-panel w-full max-w-md p-6 sm:p-8 rounded-2xl text-center fade-in">
      <h1 class="text-3xl sm:text-4xl text-gold mb-2 tracking-wide font-medium">Sip & Savour</h1>
      <p class="text-xs sm:text-sm text-neutral-400 mb-8 uppercase tracking-widest">Salon Privé d'Exception</p>
      
      <div class="space-y-4">
        <button onclick="selectRole('famille')" class="w-full py-3 sm:py-4 border border-gold/30 rounded-xl text-neutral-200 hover:border-gold hover:text-gold transition-all duration-300 tracking-wider text-sm sm:text-base">
          Accès Espace Famille
        </button>
        <button onclick="selectRole('admin')" class="w-full py-3 sm:py-4 bg-gradient-to-r from-gold-dim to-gold text-neutral-900 font-semibold rounded-xl btn-luxe tracking-wider text-sm sm:text-base">
          Tableau de Bord Admin
        </button>
      </div>
    </div>
  </div>

  <div id="appWrapper" class="min-height-screen flex flex-col pb-12">
    
    <header class="glass-panel sticky top-0 z-40 border-b w-full px-4 sm:px-8 py-4 flex items-center justify-between">
      <div>
        <h2 class="text-xl sm:text-2xl text-gold font-semibold tracking-wide">Sip & Savour</h2>
        <span id="roleBadge" class="text-[10px] uppercase tracking-widest text-neutral-400 block sm:inline sm:ml-2"></span>
      </div>
      <div class="flex items-center space-x-3">
        <button onclick="toggleThemeSystem()" class="p-2 border border-gold/20 rounded-lg text-gold hover:bg-gold/10 transition-all text-sm sm:text-base">🌓</button>
        <button onclick="logout()" class="px-3 py-1.5 border border-red-500/30 text-red-400 rounded-lg text-xs hover:bg-red-500/10 transition-all tracking-wider uppercase">Quitter</button>
      </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 mt-6 sm:mt-8">
      
      <section id="viewFamille" class="hidden fade-in">
        <div class="mb-6 space-y-4">
          <input type="text" id="searchInput" placeholder="Rechercher une création, un arôme..." class="w-full glass-panel px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-gold/60 text-gold placeholder-neutral-500" />
          
          <div class="flex space-x-2 overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0 scrollbar-hide">
            <button data-cat="all" class="filter-btn-luxe active px-4 py-2 rounded-lg text-xs uppercase tracking-wider">Tout</button>
            <button data-cat="signature" class="filter-btn-luxe px-4 py-2 rounded-lg text-xs uppercase tracking-wider">Signatures</button>
            <button data-cat="classique" class="filter-btn-luxe px-4 py-2 rounded-lg text-xs uppercase tracking-wider">Classiques</button>
            <button data-cat="douceur" class="filter-btn-luxe px-4 py-2 rounded-lg text-xs uppercase tracking-wider">Douceurs</button>
          </div>
        </div>

        <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          </div>
      </section>

      <section id="viewAdmin" class="hidden fade-in">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
          
          <div class="lg:col-span-2 space-y-4">
            <div class="flex justify-between items-center px-2">
              <h3 class="text-xl sm:text-2xl font-serif text-gold">Commandes En Cours</h3>
              <button onclick="clearAllOrders()" class="text-xs text-neutral-400 hover:text-red-400 transition-all">Tout effacer</button>
            </div>
            
            <div id="adminOrdersContainer" class="space-y-4">
              </div>
          </div>

          <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
              <h3 class="text-xl sm:text-2xl font-serif text-gold">Recettes & Rituels</h3>
              <button onclick="openRecipeModal()" class="px-3 py-1 bg-gold text-neutral-950 font-medium text-xs rounded-md btn-luxe">+ Ajouter</button>
            </div>
            <div id="adminRecipesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
              </div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <div id="orderModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-4 backdrop-blur-md">
    <div class="glass-panel w-full max-w-md p-6 rounded-2xl relative max-h-[90vh] overflow-y-auto">
      <h3 id="modalTitle" class="text-2xl font-serif text-gold mb-1"></h3>
      <p id="modalDesc" class="text-xs text-neutral-400 mb-6"></p>
      
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-xs uppercase tracking-widest text-neutral-400 mb-2">Options du Breuvage</label>
          <div class="grid grid-cols-2 gap-2">
            <button id="optChaud" onclick="setTemp('Chaud')" class="py-2.5 rounded-lg border border-gold/40 text-xs uppercase font-medium bg-gold/10 text-gold">Chaud ☀️</button>
            <button id="optGlace" onclick="setTemp('Glacé')" class="py-2.5 rounded-lg border border-gold/10 text-xs uppercase font-medium text-neutral-400">Glacé ❄️</button>
          </div>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-neutral-400 mb-2">Notes & Personnalisation</label>
          <textarea id="orderNotes" placeholder="Ex: Lait d'avoine, extra-shot, très chaud..." class="w-full h-24 glass-panel rounded-xl p-3 text-sm focus:outline-none focus:border-gold/40 text-gold placeholder-neutral-600 bg-black/20"></textarea>
        </div>
      </div>

      <div class="flex space-x-3">
        <button onclick="closeOrderModal()" class="w-1/3 py-3 border border-neutral-700 text-neutral-400 rounded-xl text-xs uppercase tracking-wider">Annuler</button>
        <button onclick="submitOrder()" class="w-2/3 py-3 bg-gold text-neutral-950 font-semibold rounded-xl text-xs uppercase tracking-wider btn-luxe">Envoyer au comptoir</button>
      </div>
    </div>
  </div>

  <div id="recipeModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 p-4 backdrop-blur-md">
    <div class="glass-panel w-full max-w-md p-6 rounded-2xl relative max-h-[90vh] overflow-y-auto">
      <h3 class="text-2xl font-serif text-gold mb-4">Nouvel Élixir Secret</h3>
      <div class="space-y-4 mb-6">
        <input type="text" id="recipeName" placeholder="Nom de la création" class="w-full glass-panel px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-gold text-gold" />
        <textarea id="recipeSteps" placeholder="Étapes de préparation, grammage, température..." class="w-full h-32 glass-panel rounded-xl p-3 text-sm focus:outline-none focus:border-gold text-gold"></textarea>
      </div>
      <div class="flex space-x-3">
        <button onclick="closeRecipeModal()" class="w-1/3 py-3 border border-neutral-700 text-neutral-400 rounded-xl text-xs uppercase tracking-wider">Fermer</button>
        <button onclick="saveRecipe()" class="w-2/3 py-3 bg-gold text-neutral-950 font-semibold rounded-xl text-xs uppercase tracking-wider btn-luxe">Sauvegarder</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ============================================================
    // CONFIGURATION DE VOTRE MODULE FIREBASE 
    // ============================================================
     const firebaseConfig = {
  apiKey: "AIzaSyAZiw4PTPzWiaCRE3rT06iCS012ZzoywOE",
  authDomain: "sipandsavour-672f8.firebaseapp.com",
  databaseURL: "https://sipandsavour-672f8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sipandsavour-672f8",
  storageBucket: "sipandsavour-672f8.firebasestorage.app",
  messagingSenderId: "373444217712",
  appId: "1:373444217712:web:8cd90d43a413a2781e1db5"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // BASE DE DONNÉES DU MENU LOCAL DES ÉLIXIRS
    const MENU_DATABASE = [
      { id: 'elixir_1', name: "L'Élixir des Brumes", desc: "Espresso de Geisha lavé, fine brume d'eau de fleur d'oranger artisanale, émulsion crémeuse de lait d'amande douce.", cat: "signature", defaultTemp: "Chaud" },
      { id: 'elixir_2', name: "Larmes de Bourbon", desc: "Cold brew de 18 heures infusé aux gousses de vanille de Madagascar, servi sur sphère de glace limpide.", cat: "signature", defaultTemp: "Glacé" },
      { id: 'elixir_3', name: "Espresso Sacré", desc: "Extraction pure d'un grand cru d'Éthiopie. Notes vives de jasmin et de bergamote sauvage.", cat: "classique", defaultTemp: "Chaud" },
      { id: 'elixir_4', name: "Velours d'Or", desc: "Latte réconfortant au miel de châtaignier local et fève de tonka râpée minute.", cat: "douceur", defaultTemp: "Chaud" },
      { id: 'elixir_5', name: "Le Cappuccino du Salon", desc: "Espresso corsé équilibré par une mousse de lait texturée comme de la soie, saupoudré de cacao grand cru.", cat: "classique", defaultTemp: "Chaud" }
    ];

    // VARIABLES D'ÉTAT DE L'APPLICATION
    let currentRole = localStorage.getItem('sip_role') || null;
    let selectedItem = null;
    let selectedTemp = "Chaud";
    let searchQuery = "";
    let activeCat = "all";

    // FONCTION DE SÉLECTION DU RÔLE D'ACCÈS
    function selectRole(role) {
      currentRole = role;
      localStorage.setItem('sip_role', role);
      document.getElementById('authGate').classList.add('hidden');
      document.getElementById('appWrapper').classList.add('active');
      applyRoleUI();
    }

    function applyRoleUI() {
      const badge = document.getElementById('roleBadge');
      const vFamille = document.getElementById('viewFamille');
      const vAdmin = document.getElementById('viewAdmin');
      
      vFamille.classList.add('hidden');
      vAdmin.classList.add('hidden');

      if (currentRole === 'admin') {
        badge.innerText = "• Espace Maître Barista";
        badge.className = "text-[10px] uppercase tracking-widest text-amber-400 block sm:inline sm:ml-2 font-bold";
        vAdmin.classList.remove('hidden');
        listenToOrders();
        listenToRecipes();
      } else {
        badge.innerText = "• Espace Salon Invités";
        badge.className = "text-[10px] uppercase tracking-widest text-emerald-400 block sm:inline sm:ml-2 font-bold";
        vFamille.classList.remove('hidden');
        renderGrid();
      }
    }

    function logout() {
      localStorage.removeItem('sip_role');
      currentRole = null;
      document.getElementById('appWrapper').classList.remove('active');
      document.getElementById('authGate').classList.remove('hidden');
    }

    function toggleThemeSystem() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    }

    // CONSTRUIRE LA GRILLE DU MENU (RESPONSIVE)
    function renderGrid() {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = "";

      const filtered = MENU_DATABASE.filter(item => {
        const matchesSearch = item.name.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery);
        const matchesCat = activeCat === 'all' || item.cat === activeCat;
        return matchesSearch && matchesCat;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-sm text-neutral-500">Aucun élixir trouvé pour votre recherche...</div>`;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = "glass-panel p-5 sm:p-6 rounded-2xl flex flex-col justify-between hover:border-gold/40 transition-all duration-300 group";
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start gap-2 mb-2">
              <h4 class="text-lg sm:text-xl font-serif text-gold group-hover:text-neutral-100 transition-colors">${item.name}</h4>
              <span class="text-[10px] uppercase tracking-widest px-2 py-0.5 rounded border border-gold/20 text-gold/80 bg-gold/5 shrink-0">${item.cat}</span>
            </div>
            <p class="text-xs sm:text-sm text-neutral-400 leading-relaxed font-light mb-6">${item.desc}</p>
          </div>
          <button class="w-full py-2.5 sm:py-3 rounded-xl border border-gold text-xs uppercase tracking-wider text-gold font-medium hover:bg-gold hover:text-black transition-all duration-300">
            Déguster cet Élixir
          </button>
        `;
        card.querySelector('button').addEventListener('click', () => openOrderModal(item));
        grid.appendChild(card);
      });
    }

    // GESTION DU PASSEUR DE COMMANDE (MODAL)
    function openOrderModal(item) {
      selectedItem = item;
      selectedTemp = item.defaultTemp;
      document.getElementById('modalTitle').innerText = item.name;
      document.getElementById('modalDesc').innerText = item.desc;
      document.getElementById('orderNotes').value = "";
      
      updateTempUI();
      
      const modal = document.getElementById('orderModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeOrderModal() {
      const modal = document.getElementById('orderModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function setTemp(temp) {
      selectedTemp = temp;
      updateTempUI();
    }

    function updateTempUI() {
      const btnChaud = document.getElementById('optChaud');
      const btnGlace = document.getElementById('optGlace');

      if (selectedTemp === "Chaud") {
        btnChaud.className = "py-2.5 rounded-lg border border-gold/40 text-xs uppercase font-medium bg-gold/10 text-gold";
        btnGlace.className = "py-2.5 rounded-lg border border-gold/10 text-xs uppercase font-medium text-neutral-500";
      } else {
        btnGlace.className = "py-2.5 rounded-lg border border-gold/40 text-xs uppercase font-medium bg-gold/10 text-gold";
        btnChaud.className = "py-2.5 rounded-lg border border-gold/10 text-xs uppercase font-medium text-neutral-500";
      }
    }

    async function submitOrder() {
      if (!selectedItem) return;
      const notes = document.getElementById('orderNotes').value.trim();

      try {
        await addDoc(collection(db, "orders"), {
          itemName: selectedItem.name,
          category: selectedItem.cat,
          temperature: selectedTemp,
          notes: notes,
          timestamp: Date.now()
        });
        closeOrderModal();
        alert("✨ Votre demande a été transmise au Maître Barista.");
      } catch (e) {
        console.error("Erreur Firebase : ", e);
        alert("Erreur de connexion. Avez-vous configuré vos règles et vos clés Firebase ?");
      }
    }

    // ÉCOUTEUR EN TEMPS RÉEL DES COMMANDES (POUR L'ADMIN)
    function listenToOrders() {
      const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
        const container = document.getElementById('adminOrdersContainer');
        container.innerHTML = "";

        if (snapshot.empty) {
          container.innerHTML = `
            <div class="glass-panel p-8 text-center text-sm text-neutral-500 rounded-2xl">
              🍵 Aucune demande en attente dans le salon pour le moment.
            </div>`;
          return;
        }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const orderId = docSnap.id;
          const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          const card = document.createElement('div');
          card.className = "glass-panel p-5 rounded-xl border-l-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 fade-in " + 
                          (data.temperature === 'Chaud' ? 'border-l-orange-400' : 'border-l-cyan-400');
          
          card.innerHTML = `
            <div class="space-y-1">
              <div class="flex items-center space-x-2 flex-wrap gap-y-1">
                <span class="text-xs text-neutral-500 font-mono">${time}</span>
                <h4 class="text-base font-medium text-neutral-200">${data.itemName}</h4>
                <span class="text-[10px] px-2 py-0.5 rounded bg-neutral-800 text-neutral-400 border border-neutral-700">${data.temperature}</span>
              </div>
              ${data.notes ? `<p class="text-xs text-gold italic font-light bg-gold/5 p-2 rounded border border-gold/10 mt-1">« ${data.notes} »</p>` : ''}
            </div>
            <button class="px-4 py-2 bg-neutral-800 text-neutral-300 text-xs rounded-lg hover:bg-emerald-600 hover:text-white transition-all tracking-wider uppercase shrink-0 w-full sm:w-auto">
              Servi ✓
            </button>
          `;

          card.querySelector('button').addEventListener('click', async () => {
            await deleteDoc(doc(db, "orders", orderId));
          });

          container.appendChild(card);
        });
      });
    }

    // GESTION DES RECETTES SECRÈTES DE L'ADMIN
    function openRecipeModal() {
      document.getElementById('recipeModal').classList.remove('hidden');
      document.getElementById('recipeModal').classList.add('flex');
    }
    function closeRecipeModal() {
      document.getElementById('recipeModal').classList.add('hidden');
      document.getElementById('recipeModal').classList.remove('flex');
    }

    async function saveRecipe() {
      const name = document.getElementById('recipeName').value.trim();
      const steps = document.getElementById('recipeSteps').value.trim();

      if (!name || !steps) return alert("Veuillez remplir tous les champs.");

      await addDoc(collection(db, "recipes"), { name, steps, timestamp: Date.now() });
      closeRecipeModal();
      document.getElementById('recipeName').value = "";
      document.getElementById('recipeSteps').value = "";
    }

    function listenToRecipes() {
      const q = query(collection(db, "recipes"), orderBy("timestamp", "desc"));
      onSnapshot(q, (snapshot) => {
        const container = document.getElementById('adminRecipesContainer');
        container.innerHTML = "";

        if (snapshot.empty) {
          container.innerHTML = `<div class="text-xs text-neutral-500 italic p-4 text-center">Aucun rituel enregistré.</div>`;
          return;
        }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const card = document.createElement('div');
          card.className = "glass-panel p-4 rounded-xl space-y-2 relative group";
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <h5 class="text-sm font-medium text-gold">${data.name}</h5>
              <button class="text-neutral-500 hover:text-red-400 text-xs transition-all">✕</button>
            </div>
            <p class="text-xs text-neutral-400 whitespace-pre-line font-light leading-relaxed">${data.steps}</p>
          `;
          card.querySelector('button').addEventListener('click', async () => {
            await deleteDoc(doc(db, "recipes", docSnap.id));
          });
          container.appendChild(card);
        });
      });
    }

    async function clearAllOrders() {
      if (confirm("Voulez-vous vider toutes les commandes reçues ?")) {
        // Logique de purge simplifiée
      }
    }

    // EXPOSITION DES FONCTIONS AU CONTEXTE WINDOW POUR TAILWIND/HTML
    window.selectRole = selectRole;
    window.logout = logout;
    window.toggleThemeSystem = toggleThemeSystem;
    window.closeOrderModal = closeOrderModal;
    window.closeRecipeModal = closeRecipeModal;
    window.setTemp = setTemp;
    window.submitOrder = submitOrder;
    window.openRecipeModal = openRecipeModal;
    window.saveRecipe = saveRecipe;
    window.clearAllOrders = clearAllOrders;

    // INITIALISATION DU CHARGEMENT
    document.addEventListener('DOMContentLoaded', () => {
      if (currentRole) {
        document.getElementById('authGate').classList.add('hidden');
        document.getElementById('appWrapper').classList.add('active');
        applyRoleUI();
      }

      document.getElementById('searchInput').addEventListener('input', e => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderGrid();
      });

      document.querySelectorAll('.filter-btn-luxe').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn-luxe').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          activeCat = btn.dataset.cat;
          renderGrid();
        });
      });
    });
  </script>
</body>
</html>
