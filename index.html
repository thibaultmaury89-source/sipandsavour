<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sip & Savour — Administration Persistante</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      databaseURL: "https://VOTRE_PROJECT-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <style>
    /* Styles conservés identiques pour l'interface luxe */
    :root { --gold: #c5a880; --panel-bg: rgba(24, 16, 11, 0.85); --text-light: #fdfbf7; }
    body { background: #110a05; color: var(--text-light); font-family: sans-serif; padding: 20px; }
    .dashboard-container { background: var(--panel-bg); padding: 25px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 20px; }
    .form-input { display: block; width: 100%; margin: 10px 0; padding: 10px; background: #000; border: 1px solid var(--gold); color: #fff; }
    .btn-luxe { background: var(--gold); border: none; padding: 10px 20px; cursor: pointer; color: #000; font-weight: bold; }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <h2 style="color:var(--gold)">Configuration des options (Persistante)</h2>
    <label>Options de Laits Élite</label>
    <input type="text" id="cfgMilksList" class="form-input" />
    
    <label>Options de Sucres</label>
    <input type="text" id="cfgSugarsList" class="form-input" />
    
    <button class="btn-luxe" onclick="saveGlobalSettings()">Enregistrer les configurations</button>
  </div>

  <div class="dashboard-container">
    <h2 style="color:var(--gold)">Configuration du Barista</h2>
    <input type="text" id="cfgBaristaTitle" class="form-input" placeholder="Nom de la boisson vedette" />
    <button class="btn-luxe" onclick="saveBaristaSettings()">Enregistrer Barista</button>
  </div>

  <script>
    // 1. CHARGEMENT AUTOMATIQUE AU REFRESH
    document.addEventListener("DOMContentLoaded", () => {
      // Écoute les changements sur la config globale
      db.ref("sip_savour_config").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
          if (data.milksList) document.getElementById("cfgMilksList").value = data.milksList;
          if (data.sugarsList) document.getElementById("cfgSugarsList").value = data.sugarsList;
          console.log("Configuration globale chargée.");
        }
      });

      // Écoute les changements sur le barista
      db.ref("sip_savour_config/barista").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data && data.title) {
          document.getElementById("cfgBaristaTitle").value = data.title;
        }
      });
    });

    // 2. FONCTIONS DE SAUVEGARDE (Envoi vers Firebase)
    function saveGlobalSettings() {
      const milks = document.getElementById("cfgMilksList").value;
      const sugars = document.getElementById("cfgSugarsList").value;

      db.ref("sip_savour_config").update({
        milksList: milks,
        sugarsList: sugars
      })
      .then(() => alert("Configuration globale enregistrée !"))
      .catch((err) => alert("Erreur : " + err));
    }

    function saveBaristaSettings() {
      const title = document.getElementById("cfgBaristaTitle").value;

      db.ref("sip_savour_config/barista").set({
        title: title
      })
      .then(() => alert("Configuration Barista enregistrée !"))
      .catch((err) => alert("Erreur : " + err));
    }
  </script>
</body>
</html>
