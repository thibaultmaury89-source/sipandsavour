<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sip & Savour — Salon Privé & Maison de Torréfaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-salon:    #110a05;
      --panel-bg:    rgba(24, 16, 11, 0.85);
      --gold:        #c5a880;
      --gold-dim:    #9c825f;
      --cream:       #f4ede2;
      --text-light:  #fdfbf7;
      --text-muted:  #a69585;
      --border-fine: rgba(197, 168, 128, 0.25);
      --shadow-luxe: 0 20px 40px rgba(0,0,0,0.6);
      --font-serif:  'Cormorant Garamond', serif;
      --font-sans:   'Montserrat', sans-serif;
      --transition:  all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    [data-theme="light"] {
      --bg-salon:    #f7f4ee;
      --panel-bg:    rgba(255, 253, 249, 0.9);
      --gold:        #8e734e;
      --gold-dim:    #6b5435;
      --cream:       #2a241e;
      --text-light:  #1c1712;
      --text-muted:  #615549;
      --border-fine: rgba(142, 115, 78, 0.2);
      --shadow-luxe: 0 15px 30px rgba(42,36,30,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-salon);
      color: var(--text-light);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* ÉCRAN DE VERROUILLAGE LUXE */
    #gateway-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #160f0a 0%, #070301 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; text-align: center;
    }
    .gateway-container {
      max-width: 420px; width: 100%; padding: 40px;
      background: rgba(24, 16, 11, 0.75); border: 1px solid var(--border-fine);
      border-radius: 8px; backdrop-filter: blur(20px); box-shadow: var(--shadow-luxe);
    }
    .gateway-title {
      font-family: var(--font-serif); font-size: 2.2rem; color: var(--gold);
      margin-bottom: 10px; font-weight: 400; letter-spacing: 1px;
    }

    /* APPLICATION PRINCIPALE */
    #app-container { display: none; opacity: 0; transition: opacity 0.6s ease; }
    #app-container.active { display: block; opacity: 1; }

    header {
      padding: 30px 5%; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-fine); background: var(--panel-bg); backdrop-filter: blur(10px);
    }
    .brand h1 { font-family: var(--font-serif); font-size: 1.8rem; color: var(--gold); font-weight: 600; }
    .brand p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-top: 2px; }

    .nav-actions { display: flex; align-items: center; gap: 15px; }
    .btn-luxe {
      background: transparent; color: var(--gold); border: 1px solid var(--gold);
      padding: 10px 22px; font-family: var(--font-sans); font-size: 0.75rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.5px; border-radius: 0; cursor: pointer;
      transition: var(--transition); display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-luxe:hover { background: var(--gold); color: #110a05; box-shadow: 0 0 15px rgba(197,168,128,0.4); }

    /* STRUCTURES ET FILTRES */
    main { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    .filter-bar {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      gap: 20px; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-fine);
    }
    .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-filter {
      background: transparent; color: var(--text-muted); border: 1px solid transparent;
      padding: 6px 14px; font-size: 0.75rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 1px; cursor: pointer; transition: var(--transition);
    }
    .btn-filter:hover, .btn-filter.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

    .search-wrapper { position: relative; max-width: 300px; width: 100%; }
    .search-input {
      width: 100%; background: rgba(0,0,0,0.15); border: 1px solid var(--border-fine);
      padding: 10px 15px; color: var(--text-light); font-size: 0.85rem; font-family: var(--font-sans); outline: none;
    }

    /* GRILLE CARTE CLIENT */
    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 35px; margin-bottom: 60px;
    }
    .carte-item {
      background: var(--panel-bg); border: 1px solid var(--border-fine);
      padding: 25px; display: flex; flex-direction: column; gap: 15px;
      box-shadow: var(--shadow-luxe); position: relative; transition: var(--transition);
    }
    .carte-item:hover { transform: translateY(-5px); border-color: var(--gold); }
    .item-media { position: relative; width: 100%; height: 200px; overflow: hidden; background: #000; }
    .item-media img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: var(--transition); }
    .carte-item:hover .item-media img { transform: scale(1.05); opacity: 1; }
    
    .item-tag-hot-cold {
      position: absolute; top: 12px; left: 12px; z-index: 2; padding: 4px 8px;
      font-size: 0.6rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;
    }
    .tag-hot { background: #5c2516; color: #ffbca8; }
    .tag-cold { background: #163f5c; color: #a8dfff; }

    .item-header { display: flex; align-items: baseline; gap: 10px; }
    .item-title { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 600; color: var(--gold); }
    .item-line-dots { flex-grow: 1; border-bottom: 1px dotted var(--border-fine); position: relative; top: -4px; }
    .item-price { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 600; color: var(--text-light); }
    .item-description { font-size: 0.8rem; line-height: 1.5; color: var(--text-muted); min-height: 48px; }

    .item-family-tag {
      display: inline-block; padding: 3px 8px; font-size: 0.6rem; font-weight: 600;
      letter-spacing: 1px; border: 1px solid var(--border-fine); border-radius: 2px;
    }
    .tag-cafe { color: #d4a373; background: rgba(212,163,115,0.08); }
    .tag-the { color: #ccd5ae; background: rgba(204,213,174,0.08); }
    .tag-infusion { color: #e8a598; background: rgba(232,165,152,0.08); }

    /* SECTION ADMIN CUISINE */
    .dashboard-section {
      background: rgba(14, 9, 5, 0.95); border-top: 2px solid var(--gold);
      padding: 40px 5%; margin-top: 80px; box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
    }
    .dashboard-title {
      font-family: var(--font-serif); font-size: 1.8rem; color: var(--gold);
      margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;
    }
    .orders-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px;
    }
    .order-card {
      background: #1c130c; border: 1px solid var(--border-fine); padding: 20px;
      display: flex; flex-direction: column; gap: 15px; position: relative;
    }
    .order-card.status-pending { border-left: 4px solid #b87333; }
    .order-card.status-preparing { border-left: 4px solid #dfa156; }
    .order-card.status-ready { border-left: 4px solid #739072; opacity: 0.75; }
    
    .order-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); }
    .order-user { font-weight: 600; color: var(--gold); font-size: 0.95rem; }
    .order-details { font-family: var(--font-serif); font-size: 1.15rem; border-top: 1px solid var(--border-fine); border-bottom: 1px solid var(--border-fine); padding: 10px 0; }
    .order-actions { display: flex; gap: 8px; margin-top: auto; }

    /* CATALOGUE COMPACT ADMIN */
    .admin-catalog-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px;
    }
    .admin-catalog-card {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border-fine); padding: 12px;
      display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;
    }
    .btn-single-action {
      background: transparent; color: var(--text-light); border: 1px solid var(--border-fine);
      cursor: pointer; padding: 4px 10px; transition: var(--transition);
    }
    .btn-single-action:hover { border-color: var(--gold); color: var(--gold); }
    .btn-action-delete:hover { background: #5c1616; color: #ffadad; border-color: #5c1616; }

    /* MODAL DE CONFIGURATION/COMMANDE LUXE */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 10000; background: rgba(7,4,2,0.85);
      backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center;
      padding: 20px; visibility: hidden; opacity: 0; transition: all 0.4s ease;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-box {
      background: #18100b; border: 1px solid var(--border-fine); width: 100%; max-width: 650px;
      box-shadow: var(--shadow-luxe); position: relative; display: flex; flex-direction: column;
    }
    .modal-close {
      position: absolute; top: 15px; right: 20px; background: transparent; border: none;
      color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: var(--transition); z-index: 5;
    }
    .modal-close:hover { color: var(--gold); }
    .modal-body { padding: 35px; }

    .custom-group { margin-bottom: 20px; }
    .custom-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px; display: block; }
    .custom-select, .form-input, .form-textarea {
      width: 100%; background: #0c0704; border: 1px solid var(--border-fine); padding: 12px;
      color: var(--text-light); font-family: var(--font-sans); font-size: 0.85rem; outline: none;
    }

    /* TOAST DE NOTIFICATION */
    #toastBox {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--gold); color: #110a05; padding: 12px 30px; font-weight: 500; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: 1px; box-shadow: var(--shadow-luxe); z-index: 10005;
      opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    }
    #toastBox.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* UTILS FORMULATION */
    .form-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="gateway-screen">
    <div class="gateway-container">
      <h2 class="gateway-title">Salon Sip & Savour</h2>
      <p style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:30px;">Réservation Privée & Carte Maison</p>
      
      <div style="margin-bottom:20px; text-align:left;">
        <label class="custom-label" style="text-align:center;">Entrer le code de la maison</label>
        <input type="password" id="gateway-password-input" class="form-input" style="text-align:center; font-size:1.1rem; letter-spacing:3px; border-color:var(--gold);" placeholder="••••" onkeydown="if(event.key==='Enter') window.validateGatewayLogin()" />
      </div>
      
      <button type="button" class="btn-luxe" style="width:100%; padding:14px;" onclick="window.validateGatewayLogin()">S'authentifier</button>
      <p id="gateway-global-error" style="color:#e8a598; font-size:0.75rem; margin-top:15px; display:none;">Code incorrect. Veuillez vérifier vos accès privilégiés.</p>
    </div>
  </div>

  <div id="app-container">
    <header>
      <div class="brand">
        <h1 id="dynamicBrandTitle">Sip & Savour</h1>
        <p id="dynamicBrandSub">Espace Privé Famille</p>
      </div>
      <div class="nav-actions">
        <button type="button" class="btn-luxe" style="padding:6px 12px; font-size:0.65rem;" onclick="window.toggleThemeSystem()">Aura</button>
        <button type="button" class="btn-luxe" onclick="window.logout()">Quitter</button>
      </div>
    </header>

    <main>
      <div class="filter-bar">
        <div class="filter-group" id="catFilterGroup">
          <button type="button" class="btn-filter active" data-filter-cat="all">Tout explorer</button>
          <button type="button" class="btn-filter" data-filter-cat="cafe">Cafés</button>
          <button type="button" class="btn-filter" data-filter-cat="the">Thés</button>
          <button type="button" class="btn-filter" data-filter-cat="infusion">Infusions</button>
        </div>
        <div class="filter-group" id="tempFilterGroup">
          <button type="button" class="btn-filter active" data-filter-temp="all">Chaud & Froid</button>
          <button type="button" class="btn-filter" data-filter-temp="chaud">Chaud</button>
          <button type="button" class="btn-filter" data-filter-temp="froid">Froid</button>
        </div>
        <div class="search-wrapper">
          <input type="text" id="searchInput" class="search-input" placeholder="Rechercher un élixir..." />
        </div>
      </div>

      <div class="menu-grid" id="menuGrid"></div>

      <div id="adminKitchenSection" class="dashboard-section" style="display:none;">
        <div class="dashboard-title">
          <span>Tableau de Bord des Commandes (Cuisine)</span>
          <button type="button" class="btn-luxe" style="font-size:0.65rem; padding:6px 12px;" onclick="window.clearAllOrders()">Archiver les terminées</button>
        </div>
        <div class="orders-grid" id="ordersGrid"></div>

        <div class="dashboard-title" style="margin-top:60px; border-top:1px solid var(--border-fine); padding-top:40px;">
          <span>Curation de la Carte Générale</span>
          <button type="button" class="btn-luxe" style="font-size:0.65rem; padding:6px 12px;" onclick="window.openRecipeAdminModal('')">+ Ajouter un élixir</button>
        </div>
        <div class="admin-catalog-grid" id="adminCatalogGrid"></div>
      </div>
    </main>
  </div>

  <div id="productModal" class="modal-overlay" onclick="if(event.target===this) window.closeProductModal()">
    <div class="modal-box">
      <button type="button" class="modal-close" onclick="window.closeProductModal()">×</button>
      <div class="modal-body">
        <h3 id="modalProductTitle" class="gateway-title" style="margin-bottom:5px;">Nom de la Boisson</h3>
        <p id="modalProductPrice" style="font-family:var(--font-serif); color:var(--text-muted); font-size:1.2rem; margin-bottom:25px;">0.00€</p>
        
        <form id="orderSubmissionForm" onsubmit="event.preventDefault(); window.submitOrderToFirebase();">
          <input type="hidden" id="orderProductId" />
          
          <div class="form-row-grid">
            <div class="custom-group">
              <label class="custom-label" for="orderUserSelect">Votre Prénom</label>
              <select id="orderUserSelect" class="custom-select" required>
                <option value="" disabled selected>Qui déguste ?</option>
                <option value="Papa">Papa</option>
                <option value="Maman">Maman</option>
                <option value="Famille">Un invité</option>
              </select>
            </div>
            <div class="custom-group">
              <label class="custom-label" for="orderLait">Type de Lait</label>
              <select id="orderLait" class="custom-select" data-custom-key="lait"></select>
            </div>
          </div>

          <div class="form-row-grid">
            <div class="custom-group">
              <label class="custom-label" for="orderSucre">Intensité Sucre</label>
              <select id="orderSucre" class="custom-select" data-custom-key="sucre"></select>
            </div>
            <div class="custom-group">
              <label class="custom-label" for="orderIntensite">Intensité Café/Thé</label>
              <select id="orderIntensite" class="custom-select" data-custom-key="intensite"></select>
            </div>
          </div>

          <div class="custom-group">
            <label class="custom-label" for="orderNotes">Notes particulières (Ex: Très chaud, Glace en +, etc.)</label>
            <textarea id="orderNotes" class="form-textarea" rows="2" placeholder="Vos désirs pour cette extraction..."></textarea>
          </div>

          <button type="submit" class="btn-luxe" style="width:100%; margin-top:10px; padding:14px;">Envoyer la commande au Barista</button>
        </form>
      </div>
    </div>
  </div>

  <div id="recipeAdminModal" class="modal-overlay" onclick="if(event.target===this) window.closeRecipeAdminModal()">
    <div class="modal-box" style="max-width:550px;">
      <button type="button" class="modal-close" onclick="window.closeRecipeAdminModal()">×</button>
      <div class="modal-body">
        <h3 id="recipeAdminTitle" class="gateway-title" style="margin-bottom:25px;">Ajouter une création</h3>
        
        <form id="recipeAdminForm" onsubmit="window.saveRecipeAdmin(event)">
          <input type="hidden" id="adminRecipeId" />
          
          <div class="custom-group">
            <label class="custom-label">Titre de la boisson *</label>
            <input type="text" id="adminTitle" class="form-input" required placeholder="Ex: Espresso Royal" />
          </div>

          <div class="form-row-grid">
            <div class="custom-group">
              <label class="custom-label">Catégorie</label>
              <select id="adminCat" class="custom-select">
                <option value="cafe">Café</option>
                <option value="the">Thé</option>
                <option value="infusion">Infusion</option>
              </select>
            </div>
            <div class="custom-group">
              <label class="custom-label">Température naturelle</label>
              <select id="adminTemp" class="custom-select">
                <option value="chaud">Chaud</option>
                <option value="froid">Froid</option>
              </select>
            </div>
          </div>

          <div class="form-row-grid">
            <div class="custom-group">
              <label class="custom-label">Tarif virtuel (€) *</label>
              <input type="text" id="adminPrice" class="form-input" required placeholder="Ex: 4.20" />
            </div>
            <div class="custom-group">
              <label class="custom-label">Lien de l'image (Unsplash ou autre)</label>
              <input type="url" id="adminImage" class="form-input" placeholder="https://..." />
            </div>
          </div>

          <div class="custom-group">
            <label class="custom-label">Description publique (Carte)</label>
            <textarea id="adminDescription" class="form-textarea" rows="2" required placeholder="Description pour faire saliver la famille..."></textarea>
          </div>

          <div class="custom-group">
            <label class="custom-label">Fiche Recette technique (Visible uniquement par le Barista)</label>
            <textarea id="adminRecipeInfo" class="form-textarea" rows="2" placeholder="Grammage, temps d'extraction, température de l'eau..."></textarea>
          </div>

          <button type="submit" class="btn-luxe" style="width:100%; margin-top:10px; padding:12px;">Enregistrer sur la carte Cloud</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toastBox">Notification</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // METTEZ VOS CLÉS FIREBASE REELLES CI-DESSOUS :
    const firebaseConfig = {
      apiKey: "AIzaSy...", 
      authDomain: "votre-identifiant.firebaseapp.com",
      databaseURL: "https://votre-identifiant-default-rtdb.firebaseio.com", 
      projectId: "votre-identifiant",
      storageBucket: "votre-identifiant.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };

    // Initialisation
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // États globaux partagés
    let currentRole = null;
    let catalogData = {};
    let activeCat   = "all";
    let activeTemp  = "all";
    let searchQuery = "";

    // Options d'ajustements par défaut pour la famille
    const customizationData = {
      lait: ["Sans lait", "Lait entier", "Lait d'Avoine bio", "Lait d'Amande"],
      sucre: ["Sans sucre", "Léger (1/2 sucre)", "Standard (1 sucre)", "Gourmand (2 sucres)"],
      intensite: ["Normale (Équilibrée)", "Serrée / Corsée", "Légère / Allongée"]
    };

    // Catalogue initial de Secours & Enrichi avec les nouvelles boissons chaudes
    const initialCatalog = {
      "rec_c1": { id: "rec_c1", cat: "cafe", temp: "chaud", price: "3.50", title: "Espresso Origin Ristretto", description: "Un double ristretto extrait à haute pression. Notes de cacao et de noisettes grillées.", recipeInfo: "18g de café de spécialité, 32g en tasse, extraction en 24s.", image: "https://images.unsplash.com/photo-1510705315444-837e66e8ccc2?w=500&q=80" },
      "rec_c2": { id: "rec_c2", cat: "cafe", temp: "chaud", price: "4.50", title: "Latte Macchiato Velours", description: "Une mousse de lait onctueuse transpercée par un shot d'espresso de Colombie.", recipeInfo: "150ml de lait texturé chaud, mousse fine, 1 shot espresso versé délicatement au centre.", image: "https://images.unsplash.com/photo-1570968915860-54d5c301fc9f?w=500&q=80" },
      "rec_c4": { id: "rec_c4", cat: "cafe", temp: "chaud", price: "5.20", title: "Mocaccino Artisan au Chocolat Noir", description: "L'onctuosité d'un chocolat chaud à l'ancienne fusionné avec la puissance de notre espresso de spécialité. Nappé d'éclats de fèves de cacao.", recipeInfo: "Double espresso, 20g de chocolat noir fondu 70% origine Équateur, lait entier micro-texturé et mousse fine.", image: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&q=80" },
      "rec_c5": { id: "rec_c5", cat: "cafe", temp: "chaud", price: "4.90", title: "Flat White Élixir", description: "Originaire d'Australie. Un goût de café plus prononcé qu'un latte classique, combiné avec une fine couche de micro-mousse de lait veloutée.", recipeInfo: "Double shot de ristretto (extraction courte), lait texturé très finement (sans grosse mousse) à 62°C versé au centre.", image: "https://images.unsplash.com/photo-1577968897966-3d4325b36b61?w=500&q=80" },
      "rec_t1": { id: "rec_t1", cat: "the", temp: "chaud", price: "4.00", title: "Thé Vert Sencha Impérial", description: "Thé vert d'exception sourcé au Japon, offrant de puissantes notes végétales et iodées.", recipeInfo: "4g de feuilles, eau purifiée à 75°C, infusion exacte pendant 2 minutes 30.", image: "https://images.unsplash.com/photo-1627435601361-ec25f5b1d0e5?w=500&q=80" },
      "rec_t4": { id: "rec_t4", cat: "the", temp: "chaud", price: "4.80", title: "Chaï Latte Impérial", description: "Thé noir d'Assam infusé aux épices traditionnelles (cardamome, cannelle, gingembre, clou de girofle), émulsionné au lait d'avoine crémeux.", recipeInfo: "Concentré de Chaï maison mijoté 2h, complété à parts égales avec un lait d'avoine texturé à la vapeur. Saupoudré de cannelle.", image: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500&q=80" },
      "rec_i1": { id: "rec_i1", cat: "infusion", temp: "chaud", price: "3.80", title: "Nuit Paisible Verveine Menthe", description: "Mélange réconfortant de verveine odorante du jardin et de menthe poivrée fraîche.", recipeInfo: "Infusion à 95°C pendant 5 minutes. Servir dans la théière en grès.", image: "https://images.unsplash.com/photo-1576092768277-317bbd6c3afb?w=500&q=80" },
      "rec_i4": { id: "rec_i4", cat: "infusion", temp: "chaud", price: "3.90", title: "Infusion Réconfort Golden Milk", description: "Une boisson bienfaisante et sans théine à base de curcuma, gingembre, poivre noir et lait végétal. Douceur miellée et épicée.", recipeInfo: "Pâte de curcuma activée au poivre, lait d'amande chauffé à la buse vapeur, une cuillère de miel de châtaignier.", image: "https://images.unsplash.com/photo-1543257580-7269da773bf5?w=500&q=80" }
    };

    // FILTRAGE ET VALIDATION DES ACCÈS COMPLETS
    function validateGatewayLogin() {
      const input = document.getElementById("gateway-password-input");
      const errorMsg = document.getElementById("gateway-global-error");
      if (!input) return;
      const pass = input.value.trim();

      if (pass === "1311") {
        localStorage.setItem("s_gate_passed", "true");
        localStorage.setItem("s_role", "barista");
        proceedToApplication("barista");
      } else if (pass.toLowerCase() === "famille" || pass === "1234") {
        localStorage.setItem("s_gate_passed", "true");
        localStorage.setItem("s_role", "family");
        proceedToApplication("family");
      } else {
        if (errorMsg) errorMsg.style.display = "block";
      }
    }

    function proceedToApplication(role) {
      currentRole = role;
      document.getElementById("gateway-screen").style.display = "none";
      const appBlock = document.getElementById("app-container");
      appBlock.classList.add("active");

      const mainTitle = document.getElementById("dynamicBrandTitle");
      const subTitle = document.getElementById("dynamicBrandSub");
      const kitchenPanel = document.getElementById("adminKitchenSection");

      if (role === "barista") {
        if (mainTitle) mainTitle.textContent = "Sip & Savour — Barista Counter";
        if (subTitle) subTitle.textContent = "Console de Contrôle Générale";
        if (kitchenPanel) kitchenPanel.style.display = "block";
      } else {
        if (mainTitle) mainTitle.textContent = "Sip & Savour";
        if (subTitle) subTitle.textContent = "Espace Privé Famille";
        if (kitchenPanel) kitchenPanel.style.display = "none";
      }
      renderGrid();
    }

    function logout() {
      localStorage.removeItem("s_gate_passed");
      localStorage.removeItem("s_role");
      window.location.reload();
    }

    // SYSTEME D'INITIALISATION INITIALE
    function initializeAppSystem() {
      const passed = localStorage.getItem("s_gate_passed");
      const savedRole = localStorage.getItem("s_role");
      
      if (passed === "true" && savedRole) {
        proceedToApplication(savedRole);
      }

      populateCustomizationSelects();

      // Écouteur Cloud Firebase : Catalogue
      onValue(ref(db, "recipes"), (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          // Si la base en ligne est vide, injection automatique du catalogue enrichi
          Object.keys(initialCatalog).forEach(key => {
            set(ref(db, `recipes/${key}`), initialCatalog[key]);
          });
          catalogData = initialCatalog;
        } else {
          catalogData = data;
        }
        renderGrid();
        if (currentRole === "barista") {
          renderAdminCatalog();
        }
      });

      // Écouteur Cloud Firebase : Commandes Temps Réel
      onValue(ref(db, "orders"), (snapshot) => {
        if (currentRole === "barista") {
          renderKitchenOrders(snapshot.val() || {});
        }
      });

      attachFilterDOMEvents();
    }

    // RENDU DE LA CARTE CLIENT (Corrigé pour la famille)
    function renderGrid() {
      const g = document.getElementById("menuGrid");
      if (!g) return;
      
      const items = Object.values(catalogData).filter(item => {
        const matchCat = activeCat === "all" || item.cat === activeCat;
        const matchTemp = activeTemp === "all" || item.temp === activeTemp;
        const matchQ = !searchQuery || item.title.toLowerCase().includes(searchQuery) || item.description.toLowerCase().includes(searchQuery);
        
        // CORRECTION EFFECTUÉE : Suppression des verrous restrictifs de rôle
        return matchCat && matchTemp && matchQ;
      });

      if (items.length === 0) {
        g.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:6px; color:var(--text-muted); font-family:var(--font-serif); font-size:1.2rem;">Aucun élixir ne correspond à vos filtres.</div>`;
        return;
      }

      g.innerHTML = items.map(item => `
        <div class="carte-item">
          <div class="item-media">
            <span class="item-tag-hot-cold ${item.temp === 'chaud' ? 'tag-hot' : 'tag-cold'}">${item.temp}</span>
            <img src="${escapeXSS(item.image)}" alt="${escapeXSS(item.title)}" loading="lazy" />
          </div>
          <div class="item-header">
            <h4 class="item-title">${escapeXSS(item.title)}</h4>
            <div class="item-line-dots"></div>
            <span class="item-price">${escapeXSS(item.price)}€</span>
          </div>
          <p class="item-description">${escapeXSS(item.description)}</p>
          <div>
            <span class="item-family-tag tag-${item.cat}">${item.cat.toUpperCase()}</span>
          </div>
          <button type="button" class="btn-luxe" style="margin-top:auto; padding:10px; font-size:0.68rem;" onclick="window.openProductModal('${item.id}')">Consulter & Commander</button>
        </div>
      `).join("");
    }

    // TRANSMISSION DES COMMANDES A KITCHEN
    function submitOrderToFirebase() {
      const pid = document.getElementById("orderProductId").value;
      const item = catalogData[pid];
      if (!item) return;

      const orderPayload = {
        productId: pid,
        productTitle: item.title,
        user: document.getElementById("orderUserSelect").value,
        lait: document.getElementById("orderLait").value,
        sucre: document.getElementById("orderSucre").value,
        intensite: document.getElementById("orderIntensite").value,
        notes: document.getElementById("orderNotes").value.trim(),
        status: "en_attente",
        timestamp: Date.now()
      };

      const ordersRef = ref(db, "orders");
      const newOrderRef = push(ordersRef);
      set(newOrderRef, orderPayload)
        .then(() => {
          closeProductModal();
          showNotification("Votre commande a été transmise en cuisine !");
        })
        .catch(e => alert(e.message));
    }

    // RENDU DES COMMANDES (BARISTA ONLY)
    function renderKitchenOrders(ordersObj) {
      const g = document.getElementById("ordersGrid");
      if (!g) return;

      const entries = Object.entries(ordersObj).sort((a,b) => b[1].timestamp - a[1].timestamp);
      if (entries.length === 0) {
        g.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:0.9rem; padding:20px;">Aucune commande en cours en cuisine.</p>`;
        return;
      }

      g.innerHTML = entries.map(([id, o]) => {
        let statusLabel = "En attente";
        let statusClass = "status-pending";
        if (o.status === "preparation") { statusLabel = "En préparation"; statusClass = "status-preparing"; }
        if (o.status === "pret") { statusLabel = "Prêt à servir !"; statusClass = "status-ready"; }

        const matchedItem = catalogData[o.productId];
        const ficheTechnique = matchedItem && matchedItem.recipeInfo ? `<div style="margin-top:8px; padding:6px; background:#0c0704; border-left:2px solid var(--gold); font-size:0.7rem; color:var(--gold-dim); font-family:var(--font-sans);"><strong>Recette :</strong> ${escapeXSS(matchedItem.recipeInfo)}</div>` : '';

        return `
          <div class="order-card ${statusClass}">
            <div class="order-header">
              <span>${new Date(o.timestamp).toLocaleTimeString()}</span>
              <strong>${statusLabel.toUpperCase()}</strong>
            </div>
            <div class="order-user">${escapeXSS(o.user)}</div>
            <div class="order-details">
              ${escapeXSS(o.productTitle)}
              <div style="font-size:0.75rem; font-family:var(--font-sans); color:var(--text-muted); margin-top:5px; line-height:1.4;">
                • Lait : ${escapeXSS(o.lait)}<br/>
                • Sucre : ${escapeXSS(o.sucre)}<br/>
                • Intensité : ${escapeXSS(o.intensite)}
                ${o.notes ? `<br/><span style="color:var(--gold);">• Note : "${escapeXSS(o.notes)}"</span>` : ''}
              </div>
              ${ficheTechnique}
            </div>
            <div class="order-actions">
              ${o.status === 'en_attente' ? `<button type="button" class="btn-single-action" style="flex:1;" onclick="window.updateOrderStatus('${id}', 'preparation')">Préparer</button>` : ''}
              ${o.status === 'preparation' ? `<button type="button" class="btn-single-action" style="flex:1; border-color:var(--gold); color:var(--gold);" onclick="window.updateOrderStatus('${id}', 'pret')">Prêt !</button>` : ''}
              <button type="button" class="btn-single-action btn-action-delete" onclick="window.deleteOrderSingle('${id}')">×</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function updateOrderStatus(id, targetStatus) {
      update(ref(db, `orders/${id}`), { status: targetStatus });
    }

    function deleteOrderSingle(id) {
      remove(ref(db, `orders/${id}`));
    }

    function clearAllOrders() {
      if(confirm("Archiver et vider toutes les commandes terminées ?")) {
        onValue(ref(db, "orders"), (snap) => {
          const data = snap.val() || {};
          Object.entries(data).forEach(([id, o]) => {
            if (o.status === "pret") remove(ref(db, `orders/${id}`));
          });
        }, { onlyOnce: true });
      }
    }

    // MODAL DE CONFIGURATION & DESCRIPTIONS CLIENT
    function openProductModal(id) {
      const item = catalogData[id];
      if (!item) return;

      document.getElementById("orderProductId").value = id;
      document.getElementById("modalProductTitle").textContent = item.title;
      document.getElementById("modalProductPrice").textContent = `${item.price}€`;
      document.getElementById("orderNotes").value = "";
      document.getElementById("orderUserSelect").selectedIndex = 0;

      document.getElementById("productModal").classList.add("active");
    }

    function closeProductModal() {
      document.getElementById("productModal")?.classList.remove("active");
    }

    // AJOUT / MODIFICATION DE BOISSONS (ADMIN RECETTES)
    function openRecipeAdminModal(id = '') {
      const m = document.getElementById("recipeAdminModal");
      const form = document.getElementById("recipeAdminForm");
      if (!m || !form) return;
      form.reset();
      
      if (id && catalogData[id]) {
        const item = catalogData[id];
        document.getElementById("recipeAdminTitle").textContent = "Éditer l'élixir";
        document.getElementById("adminRecipeId").value = item.id;
        document.getElementById("adminTitle").value = item.title;
        document.getElementById("adminCat").value = item.cat;
        document.getElementById("adminTemp").value = item.temp;
        document.getElementById("adminPrice").value = item.price;
        document.getElementById("adminImage").value = item.image || "";
        document.getElementById("adminDescription").value = item.description;
        document.getElementById("adminRecipeInfo").value = item.recipeInfo || "";
      } else {
        document.getElementById("recipeAdminTitle").textContent = "Ajouter une création";
        document.getElementById("adminRecipeId").value = "";
      }
      m.classList.add("active");
    }

    function closeRecipeAdminModal() {
      document.getElementById("recipeAdminModal")?.classList.remove("active");
    }

    // 🔥 FONCTION DE SAUVEGARDE NETTOYÉE ET CORRIGÉE
    function saveRecipeAdmin(e) {
      if (e && typeof e.preventDefault === 'function') {
        e.preventDefault(); // Annule la soumission classique/parasite
      }
      
      const idInput = document.getElementById("adminRecipeId").value;
      const id = idInput ? idInput.trim() : 'rec_' + Date.now();
      
      const payload = {
        id: id,
        title: document.getElementById("adminTitle").value.trim(),
        cat: document.getElementById("adminCat").value,
        temp: document.getElementById("adminTemp").value,
        price: document.getElementById("adminPrice").value.trim(),
        image: document.getElementById("adminImage").value.trim() || "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500&q=80",
        description: document.getElementById("adminDescription").value.trim(),
        recipeInfo: document.getElementById("adminRecipeInfo").value.trim() || "Recette standard calibrée."
      };

      if (!payload.title || !payload.price) {
        alert("Veuillez renseigner un titre et un tarif.");
        return;
      }

      set(ref(db, `recipes/${id}`), payload)
        .then(() => {
          closeRecipeAdminModal();
          showNotification("Élixir enregistré sur la carte Cloud avec succès !");
        })
        .catch((err) => {
          console.error("Firebase save error:", err);
          alert("Erreur d'enregistrement Firebase : " + err.message);
        });
    }

    function deleteRecipeAdmin(id) {
      if (!id) return;
      if (confirm(`Supprimer l'élixir "${catalogData[id]?.title || id}" de la carte générale ?`)) {
        remove(ref(db, `recipes/${id}`))
          .then(() => showNotification("Élixir retiré de la carte"))
          .catch(e => console.error(e));
      }
    }

    function renderAdminCatalog() {
      const g = document.getElementById("adminCatalogGrid");
      if (!g) return;
      const items = Object.values(catalogData);
      if (items.length === 0) {
        g.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted); font-size:0.8rem;">Aucun élément configuré.</p>`;
        return;
      }
      g.innerHTML = items.map(item => `
        <div class="admin-catalog-card">
          <div style="display:flex; align-items:center; gap:10px; overflow:hidden;">
            <img src="${escapeXSS(item.image)}" style="width:36px; height:36px; object-fit:cover; border-radius:4px;" />
            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;">${escapeXSS(item.title)}</span>
          </div>
          <div style="display:flex; gap:4px; flex-shrink:0;">
            <button type="button" class="btn-single-action" style="padding:4px 8px; font-size:0.6rem;" onclick="window.openRecipeAdminModal('${item.id}')">Éditer</button>
            <button type="button" class="btn-single-action btn-action-delete" style="padding:4px 8px; font-size:0.6rem;" onclick="window.deleteRecipeAdmin('${item.id}')">×</button>
          </div>
        </div>
      `).join("");
    }

    // RE-INJECTION ET CORRECTION SYNTAXE DATASET (CAMELCASE)
    function attachFilterDOMEvents() {
      document.querySelectorAll("[data-filter-cat]").forEach(btn => {
        btn.addEventListener("click", e => {
          document.querySelectorAll("[data-filter-cat]").forEach(b => b.classList.remove("active"));
          e.target.classList.add("active");
          activeCat = e.target.dataset.filterCat; // Corrigé : dataset.filterCat au lieu de filter-cat
          renderGrid();
        });
      });

      document.querySelectorAll("[data-filter-temp]").forEach(btn => {
        btn.addEventListener("click", e => {
          document.querySelectorAll("[data-filter-temp]").forEach(b => b.classList.remove("active"));
          e.target.classList.add("active");
          activeTemp = e.target.dataset.filterTemp; // Corrigé : dataset.filterTemp au lieu de filter-temp
          renderGrid();
        });
      });

      document.getElementById("searchInput")?.addEventListener("input", e => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderGrid();
      });
    }

    // FONCTIONS TECHNIQUES ET SECURITÉ
    function populateCustomizationSelects() {
      document.querySelectorAll("select[data-custom-key]").forEach(select => {
        const key = select.getAttribute("data-custom-key");
        const options = customizationData[key] || [];
        select.innerHTML = options.map(opt => `<option value="${opt}">${opt}</option>`).join("");
      });
    }

    function toggleThemeSystem() {
      const html = document.documentElement;
      const current = html.getAttribute("data-theme") || "dark";
      html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }

    function escapeXSS(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#x27;");
    }

    function showNotification(msg) {
      const toast = document.getElementById("toastBox");
      if (!toast) return;
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3500);
    }

    // EXPOSITION GLOBALE DES METHODES AUX ACTIONS IN-DOM
    window.validateGatewayLogin  = validateGatewayLogin;
    window.toggleThemeSystem     = toggleThemeSystem;
    window.logout               = logout;
    window.submitOrderToFirebase = submitOrderToFirebase;
    window.updateOrderStatus     = updateOrderStatus;
    window.deleteOrderSingle     = deleteOrderSingle;
    window.openProductModal      = openProductModal;
    window.closeProductModal     = closeProductModal;
    window.openRecipeAdminModal  = openRecipeAdminModal;
    window.closeRecipeAdminModal = closeRecipeAdminModal;
    window.saveRecipeAdmin       = saveRecipeAdmin;
    window.deleteRecipeAdmin     = deleteRecipeAdmin;
    window.clearAllOrders        = clearAllOrders;

    document.addEventListener("keydown", event => {
      if (event.key !== "Escape") return;
      closeProductModal();
      closeRecipeAdminModal();
    });

    if (document.readyState === "complete" || document.readyState === "interactive") {
      initializeAppSystem();
    } else {
      document.addEventListener("DOMContentLoaded", initializeAppSystem);
    }
  </script>
</body>
</html>
